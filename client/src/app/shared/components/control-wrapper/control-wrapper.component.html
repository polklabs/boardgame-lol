@if (isShown()) {
  <p-inputgroup>
    <p-floatlabel variant="on" class="p-input-icon-{{ iconPosition }}">
      <ng-content></ng-content>
      <label for="{{ controlName }}">{{ getFieldLabel() }} {{ isRequired() ? '*' : '' }}</label>
      @if (isFieldInvalid()) {
        <small class="p-error block">{{ getErrorText() }}</small>
      }
      @if (!isFieldInvalid()) {
        <small class="block">{{ getLengthText() }}</small>
      }
    </p-floatlabel>
    @if (locked) {
      <!-- TODO: Make this better -->
      <p-inputgroup-addon>
        <p-button
          icon="pi pi-lock{{ lockSet ? '' : '-open' }}"
          severity="secondary"
          variant="text"
          (onClick)="toggleDisabled()" />
      </p-inputgroup-addon>
    }
  </p-inputgroup>
}
