@if (isShown()) {
  <p-floatlabel class="p-input-icon-{{ iconPosition }}">
    <ng-content></ng-content>
    <label for="{{ controlName }}">{{ getFieldLabel() }} {{ isRequired() ? '*' : '' }}</label>
    @if (isFieldInvalid()) {
      <small class="p-error block">{{ getErrorText() }}</small>
    }
    @if (!isFieldInvalid()) {
      <small class="block">{{ getLengthText() }}</small>
    }
  </p-floatlabel>
}
