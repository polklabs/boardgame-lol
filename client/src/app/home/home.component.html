<app-menu-bar page="home" (newClub)="newClub()"></app-menu-bar>

@if (editorClubVisible) {
  <app-editor-club
    [editorVisible]="editorClubVisible"
    [club]="editClub"
  (closeEditor)="editorClubVisible = false"></app-editor-club>
}

@if (((clubList$ | async)?.length ?? 0) > 0) {
  <h1>Groups You Manage</h1>
}
<div class="club-wrapper">
  @for (club of clubList$ | async; track club) {
    <div>
      <p-card
        [header]="club.name"
        subheader="Created By: {{ club.username }}"
        [style]="{ width: '360px' }"
        [routerLink]="'/club/' + club.id">
        <p>{{ club.summary }}</p>
        <ng-template #footer>
          <div class="flex gap-3 mt-1">
            <p-button label="View" class="w-full" styleClass="w-full" />
          </div>
        </ng-template>
      </p-card>
    </div>
  }
</div>

<h1>Public Groups</h1>
<div class="club-wrapper">
  @for (club of publicClubList$ | async; track club) {
    <div>
      <p-card
        [header]="club.Name"
        subheader="Created By: {{ club.CreatedBy }}"
        [style]="{ width: '360px' }"
        [routerLink]="'/club/' + club.ClubId">
        <p>{{ club.Summary }}</p>
        <ng-template #footer>
          <div class="flex gap-3 mt-1">
            <p-button label="View" class="w-full" styleClass="w-full" />
          </div>
        </ng-template>
      </p-card>
    </div>
  }
</div>
